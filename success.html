body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fbeaf0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.card { background: #fff; border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 480px; width: 100%; border: 1px solid #f0e0e5; }

.icon svg { width: 36px; height: 36px; fill: #fff; }
h1 { font-size: 24px; font-weight: 700; color: #4B1528; margin-bottom: 12px; }
p { font-size: 15px; color: #666; line-height: 1.7; margin-bottom: 8px; }
.highlight { background: #fbeaf0; border-radius: 12px; padding: 16px 20px; margin: 24px 0; font-size: 14px; color: #993556; line-height: 1.7; }
.social-links { display: flex; gap: 10px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
.social-btn { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 500; padding: 8px 18px; border-radius: 20px; text-decoration: none; border: 1px solid #ddd; color: #333; background: #fafafa; }
.social-btn:hover { border-color: #D4537E; color: #D4537E; }
.course-btn { display: inline-block; background: #D4537E; color: #fff; font-size: 16px; font-weight: 600; padding: 16px 32px; border-radius: 50px; text-decoration: none; margin: 24px 0 0; }
.course-btn:hover { background: #993556; }
.contacts { margin-top: 28px; padding-top: 24px; border-top: 1px solid #f0e0e5; }
.contacts-title { font-size: 14px; color: #999; margin-bottom: 12px; }
.tg-btn { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; padding: 10px 20px; border-radius: 20px; text-decoration: none; border: 1px solid #ddd; color: #333; background: #fafafa; }
.tg-btn svg { width: 16px; height: 16px; }
.tg-btn:hover { border-color: #D4537E; color: #D4537E; }
</style>
